<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lux Auto{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% block styles %}{% endblock %}
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a class="logo" href="{{ url_for('index.index') }}#home">Lux Auto</a>
            <button
                class="menu-toggle"
                type="button"
                aria-label="Open navigation menu"
                aria-expanded="false"
                aria-controls="mobile-menu"
            >
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-panel" id="mobile-menu">
                <div class="links">
                    <a href="{{ url_for('index.index') }}#home">Home</a>
                    <a href="#browse-cars">Browse Cars</a>
                    <a href="{{ url_for('index.index') }}#contact">Contact</a>
                </div>
                {% if session %}
                    <div class="nav-btns">
                        <a class="cta" href="/logout">Log Out</a>
                    </div>
                {% else %}
                    <div class="nav-btns">
                        <a class="cta" href="/login">Log In</a>
                        <a class="cta" href="/signup">Sign Up</a>
                    </div>
                {% endif %}
                
            </div>
        </nav>
    </header>
    <button class="menu-backdrop" type="button" aria-label="Close navigation menu"></button>
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
